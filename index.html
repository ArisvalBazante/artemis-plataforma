<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ártemis • Plataforma</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#14532d">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            safelist: ['translate-x-9', 'bg-emerald-500', 'dark:bg-emerald-500'],
            theme: { extend: { colors: { primary: '#14532d', accent: '#f59e0b', 'accent-hover': '#d97706' } } } 
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .content { display: none; animation: fadeIn 0.35s ease-out forwards; }
        .content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-link { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; white-space: nowrap; }
        .sidebar-link:hover { background-color: rgba(20, 83, 45, 0.08); transform: translateX(6px); }
        .dark .sidebar-link:hover { background-color: rgba(134, 239, 172, 0.1); }
        .nav-active { background-color: #14532d; color: white !important; box-shadow: 0 4px 6px -1px rgb(20 83 45 / 0.2); }
        .card { transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); }
        .card:hover { transform: translateY(-6px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); }
        .input-modern { transition: all 0.2s; border: 1px solid #e4e4e7; }
        .dark .input-modern { border-color: #3f3f46; background-color: #27272a; color: white; }
        .input-modern:focus { box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2); border-color: #f59e0b; outline: none; }
        .gradient-bg { background: linear-gradient(135deg, #14532d 0%, #166534 100%); }
    </style>
</head>
<body class="bg-zinc-100 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen flex overflow-hidden">

    <div id="tela-login" class="fixed inset-0 gradient-bg items-center justify-center z-50 hidden">
        <div class="bg-white/95 dark:bg-zinc-900/95 backdrop-blur-xl p-10 rounded-3xl shadow-2xl w-full max-w-md border border-white/20">
            <div class="flex justify-center mb-8"><div class="w-24 h-24 bg-white dark:bg-zinc-800 rounded-3xl flex items-center justify-center shadow-inner border border-white/30"><i class="fa-solid fa-dove text-5xl text-primary dark:text-emerald-400"></i></div></div>
            <h1 class="text-center text-4xl font-bold tracking-tighter text-primary dark:text-emerald-300 mb-2">ÁRTEMIS</h1>
            <p class="text-center text-zinc-500 dark:text-zinc-400 mb-10">Manejo Inteligente de Fauna</p>
            <input id="login_email" type="email" value="admin@silvestre.com" placeholder="Seu e-mail" class="input-modern w-full p-4 mb-4 rounded-2xl">
            <input id="login_senha" type="password" value="123456" placeholder="Senha" class="input-modern w-full p-4 mb-8 rounded-2xl">
            <button onclick="fazerLogin()" class="w-full bg-accent hover:bg-accent-hover text-white font-semibold py-4 rounded-2xl shadow-lg flex items-center justify-center gap-2"><i class="fa-solid fa-right-to-bracket"></i> Entrar</button>
            <div id="login-erro" class="hidden mt-4 text-red-600 bg-red-50 p-4 rounded-2xl text-sm font-bold text-center"></div>
        </div>
    </div>

    <div id="sistema-principal" class="hidden flex h-screen w-full">
        <div id="sidebar" class="w-72 bg-white dark:bg-zinc-900 border-r border-zinc-200 dark:border-zinc-800 flex flex-col relative z-20 shrink-0">
            <div class="px-8 py-8 flex items-center gap-4 border-b border-zinc-200 dark:border-zinc-800 h-24">
                <div class="w-11 h-11 bg-primary rounded-2xl flex items-center justify-center text-white"><i class="fa-solid fa-dove text-xl"></i></div>
                <div class="font-bold text-3xl tracking-[-1px] text-primary dark:text-emerald-400">ÁRTEMIS</div>
            </div>
            <nav class="flex-1 px-4 py-6 overflow-y-auto space-y-1" id="sidebar-menu">
                <div onclick="showTab('tab-operacao')" id="btn-tab-operacao" class="aba-menu admin tecnico sidebar-link flex items-center gap-4 px-6 py-4 rounded-3xl cursor-pointer"><i class="fa-solid fa-location-dot w-5 h-5"></i><span>Operação</span></div>
                <div onclick="showTab('tab-estoque')" id="btn-tab-estoque" class="aba-menu admin comercial sidebar-link flex items-center gap-4 px-6 py-4 rounded-3xl cursor-pointer"><i class="fa-solid fa-box w-5 h-5"></i><span>Estoque & EPIs</span></div>
                <div onclick="showTab('tab-plantel')" id="btn-tab-plantel" class="aba-menu admin comercial sidebar-link flex items-center gap-4 px-6 py-4 rounded-3xl cursor-pointer"><i class="fa-solid fa-feather w-5 h-5"></i><span>Plantel</span></div>
                <div onclick="showTab('tab-clientes')" id="btn-tab-clientes" class="aba-menu admin comercial sidebar-link flex items-center gap-4 px-6 py-4 rounded-3xl cursor-pointer"><i class="fa-solid fa-users w-5 h-5"></i><span>Clientes</span></div>
                <div onclick="showTab('tab-dashboard')" id="btn-tab-dashboard" class="aba-menu admin comercial sidebar-link flex items-center gap-4 px-6 py-4 rounded-3xl cursor-pointer"><i class="fa-solid fa-chart-column w-5 h-5"></i><span>Dashboard</span></div>
            </nav>
        </div>

        <div class="flex-1 flex flex-col overflow-hidden relative">
            <header class="h-24 bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 px-8 flex items-center justify-between">
                <h1 id="page-title" class="text-2xl font-bold">Visão Geral</h1>
                <div class="flex items-center gap-4">
                    <button onclick="toggleDarkMode()" class="p-2 rounded-full bg-zinc-100 dark:bg-zinc-800"><i class="fa-solid fa-moon"></i></button>
                    <div id="nome-logado-header" class="font-bold text-sm"></div>
                    <button onclick="fazerLogout()" class="text-red-500 font-bold text-sm">Sair</button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-10 bg-zinc-50 dark:bg-zinc-950">
                
                <div id="tab-clientes" class="content max-w-4xl mx-auto">
                    <div class="bg-white dark:bg-zinc-900 p-8 rounded-3xl shadow-sm border border-zinc-200 dark:border-zinc-800 mb-8">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-xl font-bold text-primary dark:text-emerald-400 flex items-center gap-2" id="titulo-cliente"><i class="fa-solid fa-building"></i> Cadastro de Cliente</h3>
                            <button onclick="limparFormCliente()" class="text-sm font-bold text-zinc-400 hover:text-red-500 transition"><i class="fa-solid fa-eraser"></i> Limpar</button>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                            <input type="text" id="c_nome" placeholder="Razão Social / Nome Fantasia" class="input-modern w-full p-4 rounded-xl md:col-span-2">
                            <input type="text" id="c_doc" placeholder="CNPJ / CPF" class="input-modern w-full p-4 rounded-xl">
                            <input type="text" id="c_tel" placeholder="WhatsApp Principal" class="input-modern w-full p-4 rounded-xl">
                            <input type="text" id="c_contato_nome" placeholder="Nome do Contato Principal" class="input-modern w-full p-4 rounded-xl">
                            <input type="email" id="c_email" placeholder="E-mail Principal" class="input-modern w-full p-4 rounded-xl">
                        </div>

                        <h4 class="font-bold text-zinc-700 dark:text-zinc-300 mb-2 text-sm border-t border-zinc-100 pt-4">Endereço</h4>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                            <input type="text" id="c_cep" placeholder="CEP" class="input-modern w-full p-4 rounded-xl" onblur="buscarCep()">
                            <input type="text" id="c_logradouro" placeholder="Logradouro" class="input-modern w-full p-4 rounded-xl md:col-span-2">
                            <input type="text" id="c_numero" placeholder="Nº" class="input-modern w-full p-4 rounded-xl">
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                            <input type="text" id="c_bairro" placeholder="Bairro" class="input-modern w-full p-4 rounded-xl">
                            <input type="text" id="c_cidade" placeholder="Cidade" class="input-modern w-full p-4 rounded-xl">
                            <input type="text" id="c_estado" placeholder="UF" class="input-modern w-full p-4 rounded-xl">
                        </div>

                        <div class="bg-zinc-50 dark:bg-zinc-800/50 p-6 rounded-2xl border mb-8">
                            <h4 class="font-bold text-zinc-700 text-sm mb-4">Contactos Setoriais (Opcional)</h4>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div><label class="text-[10px] font-bold text-zinc-400 uppercase">Comercial</label><input type="text" id="c_com_nome" placeholder="Nome" class="input-modern w-full p-3 rounded-xl mb-2 text-sm"><input type="text" id="c_com_tel" placeholder="Telefone" class="input-modern w-full p-3 rounded-xl text-sm"></div>
                                <div><label class="text-[10px] font-bold text-zinc-400 uppercase">Financeiro</label><input type="text" id="c_fin_nome" placeholder="Nome" class="input-modern w-full p-3 rounded-xl mb-2 text-sm"><input type="text" id="c_fin_tel" placeholder="Telefone" class="input-modern w-full p-3 rounded-xl text-sm"></div>
                                <div><label class="text-[10px] font-bold text-zinc-400 uppercase">Operacional</label><input type="text" id="c_ope_nome" placeholder="Nome" class="input-modern w-full p-3 rounded-xl mb-2 text-sm"><input type="text" id="c_ope_tel" placeholder="Telefone" class="input-modern w-full p-3 rounded-xl text-sm"></div>
                            </div>
                        </div>
                        <button id="btn-cliente" onclick="salvarCliente()" class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg flex justify-center items-center gap-2"><i class="fa-solid fa-floppy-disk"></i> Salvar Cliente</button>
                    </div>
                    <div id="lista-clientes" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>

                <div id="tab-estoque" class="content max-w-4xl mx-auto">
                    <div class="bg-white dark:bg-zinc-900 p-8 rounded-3xl shadow-sm border border-zinc-200 dark:border-zinc-800 mb-8">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-xl font-bold text-primary dark:text-emerald-400 flex items-center gap-2" id="titulo-estoque"><i class="fa-solid fa-box-open"></i> Cadastro de Material</h3>
                            <button onclick="limparFormEstoque()" class="text-sm font-bold text-zinc-400 hover:text-red-500 transition"><i class="fa-solid fa-eraser"></i> Limpar</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            <input type="text" id="est_nome" placeholder="Nome do Item" class="input-modern w-full p-4 rounded-xl">
                            <select id="est_categoria" class="input-modern w-full p-4 rounded-xl">
                                <option value="EPI">EPI</option>
                                <option value="Equipamento">Equipamento</option>
                                <option value="Consumível">Consumível</option>
                            </select>
                        </div>
                        <input type="number" id="est_qtd" placeholder="Quantidade em Estoque" class="input-modern w-full p-4 rounded-xl mb-6">
                        
                        <div id="campos_epi" class="bg-amber-50 dark:bg-amber-900/20 p-5 rounded-2xl border border-amber-200 mb-6">
                            <h4 class="text-sm font-bold text-amber-800 dark:text-amber-400 mb-4 flex items-center gap-2"><i class="fa-solid fa-shield-halved"></i> Dados de Segurança (EPI)</h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><label class="text-xs font-bold text-zinc-500 ml-1 block mb-1">Número do CA</label><input type="text" id="est_ca" class="input-modern w-full p-4 rounded-xl bg-white dark:bg-zinc-800" placeholder="Ex: 12345"></div>
                                <div><label class="text-xs font-bold text-zinc-500 ml-1 block mb-1">Validade do CA</label><input type="date" id="est_validade" class="input-modern w-full p-4 rounded-xl bg-white dark:bg-zinc-800"></div>
                            </div>
                        </div>
                        <button id="btn-estoque" onclick="salvarEstoque()" class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg flex justify-center items-center gap-2"><i class="fa-solid fa-floppy-disk"></i> Salvar Material</button>
                    </div>
                    <div id="lista-estoque" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>

                <div id="tab-plantel" class="content max-w-4xl mx-auto">
                    <div class="bg-white dark:bg-zinc-900 p-8 rounded-3xl shadow-sm border border-zinc-200 dark:border-zinc-800 mb-8">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-xl font-bold text-primary dark:text-emerald-400 flex items-center gap-2" id="titulo-ave"><i class="fa-solid fa-feather"></i> Cadastro de Ave</h3>
                            <button onclick="limparFormAve()" class="text-sm font-bold text-zinc-400 hover:text-red-500 transition"><i class="fa-solid fa-eraser"></i> Limpar</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                            <input type="text" id="a_nome" placeholder="Nome" class="input-modern w-full p-4 rounded-xl">
                            <input type="text" id="a_especie" placeholder="Espécie" class="input-modern w-full p-4 rounded-xl">
                            <input type="text" id="a_anilha" placeholder="Nº Anilha" class="input-modern w-full p-4 rounded-xl">
                        </div>
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <input type="number" id="a_min" placeholder="Peso Mínimo (g)" class="input-modern w-full p-4 rounded-xl">
                            <input type="number" id="a_max" placeholder="Peso Máximo (g)" class="input-modern w-full p-4 rounded-xl">
                        </div>
                        <h4 class="font-bold text-zinc-700 text-sm mb-2 border-t pt-4">Histórico Médico</h4>
                        <input type="text" id="a_historico" placeholder="Resumo rápido da saúde" class="input-modern w-full p-4 rounded-xl mb-4">
                        <textarea id="a_historico_detalhado" placeholder="Detalhamento médico completo..." class="input-modern w-full p-4 rounded-xl h-24 mb-6"></textarea>
                        <button id="btn-ave" onclick="salvarAve()" class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg flex justify-center items-center gap-2"><i class="fa-solid fa-floppy-disk"></i> Salvar Ave</button>
                    </div>
                    <div id="lista-aves" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>

            </main>
            <div id="toast-container" class="fixed bottom-8 left-8 z-[60] flex flex-col gap-3"></div>
        </div>
    </div>

    <script>
        const API = 'https://artemis-backend-eso2.onrender.com';
        let clientesGlobal = [], avesGlobal = [], estoqueGlobal = [], usuarioLogado = null;
        let editandoId = { cliente: null, ave: null, estoque: null };

        // --- LOGIN E START ---
        window.onload = () => {
            const auth = localStorage.getItem('artemis_auth');
            if (auth) { usuarioLogado = JSON.parse(auth); iniciarSistema(); }
            else { document.getElementById('tela-login').classList.remove('hidden'); document.getElementById('tela-login').classList.add('flex'); }
        };

        async function fazerLogin() {
            const email = document.getElementById('login_email').value;
            const senha = document.getElementById('login_senha').value;
            try {
                const res = await fetch(`${API}/login`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email, senha}) });
                const data = await res.json();
                if(data.ok) { localStorage.setItem('artemis_auth', JSON.stringify(data.usuario)); location.reload(); }
                else { document.getElementById('login-erro').innerText = data.msg; document.getElementById('login-erro').classList.remove('hidden'); }
            } catch(e) { alert("Servidor offline."); }
        }
        function fazerLogout() { localStorage.removeItem('artemis_auth'); location.reload(); }

        function iniciarSistema() {
            document.getElementById('tela-login').classList.add('hidden');
            document.getElementById('sistema-principal').classList.remove('hidden'); document.getElementById('sistema-principal').classList.add('flex');
            document.getElementById('nome-logado-header').innerText = usuarioLogado.nome;
            showTab('tab-clientes');
            carregarTudo();
            configurarListeners();
        }

        function showTab(tabId) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('nav-active'));
            document.getElementById('btn-' + tabId).classList.add('nav-active');
        }

        async function carregarTudo() { carregarClientes(); carregarAves(); carregarEstoque(); }

        // --- VIACEP ---
        async function buscarCep() {
            const cep = document.getElementById('c_cep').value.replace(/\D/g, '');
            if(cep.length === 8) {
                const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const d = await res.json();
                if(!d.erro) {
                    document.getElementById('c_logradouro').value = d.logradouro;
                    document.getElementById('c_bairro').value = d.bairro;
                    document.getElementById('c_cidade').value = d.localidade;
                    document.getElementById('c_estado').value = d.uf;
                    document.getElementById('c_numero').focus();
                }
            }
        }

        // --- CLIENTES ---
        function carregarClientes() {
            fetch(`${API}/clientes`).then(r => r.json()).then(data => {
                clientesGlobal = data;
                document.getElementById('lista-clientes').innerHTML = data.map(c => `
                    <div class="bg-white dark:bg-zinc-900 p-6 rounded-2xl border shadow-sm card">
                        <b class="text-lg">${c.nome_razao_social}</b><br>
                        <span class="text-xs text-zinc-500">${c.documento_cpf_cnpj} | ${c.cidade || 'Recife'}-${c.estado || 'PE'}</span>
                        <div class="flex gap-2 mt-4">
                            <button onclick="prepararEdicaoCliente(${c.id})" class="flex-1 bg-zinc-100 p-2 rounded-xl text-xs font-bold">Editar</button>
                            <button onclick="excluir('clientes', ${c.id})" class="bg-red-50 text-red-600 px-4 rounded-xl"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`).join('');
            });
        }

        function limparFormCliente() {
            const campos = ['c_nome','c_doc','c_tel','c_contato_nome','c_email','c_cep','c_logradouro','c_numero','c_bairro','c_cidade','c_estado','c_com_nome','c_com_tel','c_fin_nome','c_fin_tel','c_ope_nome','c_ope_tel'];
            campos.forEach(id => document.getElementById(id).value = '');
            editandoId.cliente = null;
            document.getElementById('titulo-cliente').innerText = "Cadastro de Cliente";
        }

        function prepararEdicaoCliente(id) {
            const c = clientesGlobal.find(x => x.id === id);
            document.getElementById('c_nome').value = c.nome_razao_social;
            document.getElementById('c_doc').value = c.documento_cpf_cnpj;
            document.getElementById('c_tel').value = c.telefone;
            document.getElementById('c_contato_nome').value = c.contato_nome || '';
            document.getElementById('c_email').value = c.email_contato || '';
            document.getElementById('c_cep').value = c.cep || '';
            document.getElementById('c_logradouro').value = c.logradouro || '';
            document.getElementById('c_numero').value = c.numero || '';
            document.getElementById('c_bairro').value = c.bairro || '';
            document.getElementById('c_cidade').value = c.cidade || '';
            document.getElementById('c_estado').value = c.estado || '';
            document.getElementById('c_com_nome').value = c.comercial_nome || '';
            document.getElementById('c_com_tel').value = c.comercial_tel || '';
            document.getElementById('c_fin_nome').value = c.financeiro_nome || '';
            document.getElementById('c_fin_tel').value = c.financeiro_tel || '';
            document.getElementById('c_ope_nome').value = c.operacional_nome || '';
            document.getElementById('c_ope_tel').value = c.operacional_tel || '';
            editandoId.cliente = id;
            document.getElementById('titulo-cliente').innerText = "Editando Cliente";
            window.scrollTo({top:0, behavior:'smooth'});
        }

        async function salvarCliente() {
            const dados = {
                nome_razao_social: document.getElementById('c_nome').value,
                documento_cpf_cnpj: document.getElementById('c_doc').value,
                telefone: document.getElementById('c_tel').value,
                contato_nome: document.getElementById('c_contato_nome').value,
                email_contato: document.getElementById('c_email').value,
                cep: document.getElementById('c_cep').value,
                logradouro: document.getElementById('c_logradouro').value,
                numero: document.getElementById('c_numero').value,
                bairro: document.getElementById('c_bairro').value,
                cidade: document.getElementById('c_cidade').value,
                estado: document.getElementById('c_estado').value,
                comercial_nome: document.getElementById('c_com_nome').value,
                comercial_tel: document.getElementById('c_com_tel').value,
                financeiro_nome: document.getElementById('c_fin_nome').value,
                financeiro_tel: document.getElementById('c_fin_tel').value,
                operacional_nome: document.getElementById('c_ope_nome').value,
                operacional_tel: document.getElementById('c_ope_tel').value
            };
            const url = editandoId.cliente ? `${API}/clientes/${editandoId.cliente}` : `${API}/clientes`;
            const method = editandoId.cliente ? 'PUT' : 'POST';
            await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(dados) });
            limparFormCliente(); carregarClientes(); showToast("Cliente guardado!");
        }

        // --- ESTOQUE ---
        function carregarEstoque() {
            fetch(`${API}/estoque`).then(r => r.json()).then(data => {
                estoqueGlobal = data;
                document.getElementById('lista-estoque').innerHTML = data.map(e => `
                    <div class="bg-white dark:bg-zinc-900 p-6 rounded-2xl border shadow-sm card">
                        <b class="text-lg">${e.nome_item}</b><br>
                        <span class="text-xs font-bold text-zinc-400 uppercase">${e.categoria}</span>
                        ${e.categoria === 'EPI' && e.ca_epi ? `<div class="text-[10px] mt-2 text-amber-600 font-bold">CA: ${e.ca_epi}</div>` : ''}
                        <p class="text-2xl font-bold mt-2 text-primary">${e.quantidade}</p>
                        <div class="flex gap-2 mt-4">
                            <button onclick="prepararEdicaoEstoque(${e.id})" class="flex-1 bg-zinc-100 p-2 rounded-xl text-xs font-bold">Editar</button>
                            <button onclick="excluir('estoque', ${e.id})" class="bg-red-50 text-red-600 px-4 rounded-xl"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`).join('');
            });
        }

        function configurarListeners() {
            document.getElementById('est_categoria').addEventListener('change', function(e) {
                const bloco = document.getElementById('campos_epi');
                if(e.target.value === 'EPI') bloco.classList.remove('hidden');
                else { bloco.classList.add('hidden'); document.getElementById('est_ca').value = ''; document.getElementById('est_validade').value = ''; }
            });
        }

        function limparFormEstoque() {
            document.getElementById('est_nome').value = '';
            document.getElementById('est_qtd').value = '';
            document.getElementById('est_categoria').value = 'EPI';
            document.getElementById('est_ca').value = '';
            document.getElementById('est_validade').value = '';
            document.getElementById('est_categoria').dispatchEvent(new Event('change'));
            editandoId.estoque = null;
        }

        function prepararEdicaoEstoque(id) {
            const e = estoqueGlobal.find(x => x.id === id);
            document.getElementById('est_nome').value = e.nome_item;
            document.getElementById('est_qtd').value = e.quantidade;
            document.getElementById('est_categoria').value = e.categoria;
            document.getElementById('est_ca').value = e.ca_epi || '';
            document.getElementById('est_validade').value = e.validade_epi ? e.validade_epi.split('T')[0] : '';
            document.getElementById('est_categoria').dispatchEvent(new Event('change'));
            editandoId.estoque = id;
            window.scrollTo({top:0, behavior:'smooth'});
        }

        async function salvarEstoque() {
            const dados = {
                nome_item: document.getElementById('est_nome').value,
                quantidade: document.getElementById('est_qtd').value,
                categoria: document.getElementById('est_categoria').value,
                ca_epi: document.getElementById('est_ca').value,
                validade_epi: document.getElementById('est_validade').value || null
            };
            const url = editandoId.estoque ? `${API}/estoque/${editandoId.estoque}` : `${API}/estoque`;
            await fetch(url, { method: editandoId.estoque ? 'PUT' : 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(dados) });
            limparFormEstoque(); carregarEstoque(); showToast("Estoque atualizado!");
        }

        // --- AVES ---
        function carregarAves() {
            fetch(`${API}/aves`).then(r => r.json()).then(data => {
                avesGlobal = data;
                document.getElementById('lista-aves').innerHTML = data.map(a => `
                    <div class="bg-white dark:bg-zinc-900 p-6 rounded-2xl border shadow-sm card">
                        <b class="text-lg">${a.nome}</b><br>
                        <span class="text-xs text-zinc-500">Anilha: ${a.anilha || 'N/A'}</span>
                        <div class="flex gap-2 mt-4">
                            <button onclick="prepararEdicaoAve(${a.id})" class="flex-1 bg-zinc-100 p-2 rounded-xl text-xs font-bold">Editar</button>
                            <button onclick="excluir('aves', ${a.id})" class="bg-red-50 text-red-600 px-4 rounded-xl"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`).join('');
            });
        }

        function limparFormAve() {
            document.getElementById('a_nome').value = ''; document.getElementById('a_especie').value = '';
            document.getElementById('a_anilha').value = ''; document.getElementById('a_min').value = '';
            document.getElementById('a_max').value = ''; document.getElementById('a_historico').value = '';
            document.getElementById('a_historico_detalhado').value = '';
            editandoId.ave = null;
        }

        function prepararEdicaoAve(id) {
            const a = avesGlobal.find(x => x.id === id);
            document.getElementById('a_nome').value = a.nome;
            document.getElementById('a_especie').value = a.especie;
            document.getElementById('a_anilha').value = a.anilha || '';
            document.getElementById('a_min').value = a.peso_minimo;
            document.getElementById('a_max').value = a.peso_maximo;
            document.getElementById('a_historico').value = a.historico_medico || '';
            document.getElementById('a_historico_detalhado').value = a.historico_detalhado || '';
            editandoId.ave = id;
            window.scrollTo({top:0, behavior:'smooth'});
        }

        async function salvarAve() {
            const dados = {
                nome: document.getElementById('a_nome').value,
                especie: document.getElementById('a_especie').value,
                peso_minimo: document.getElementById('a_min').value,
                peso_maximo: document.getElementById('a_max').value,
                anilha: document.getElementById('a_anilha').value,
                historico_medico: document.getElementById('a_historico').value,
                historico_detalhado: document.getElementById('a_historico_detalhado').value
            };
            const url = editandoId.ave ? `${API}/aves/${editandoId.ave}` : `${API}/aves`;
            await fetch(url, { method: editandoId.ave ? 'PUT' : 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(dados) });
            limparFormAve(); carregarAves(); showToast("Ave guardada!");
        }

        // --- UTILITÁRIOS ---
        function showToast(msg) {
            const t = document.createElement('div');
            t.className = "bg-primary text-white p-4 rounded-2xl shadow-xl animate-bounce";
            t.innerText = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function excluir(rota, id) {
            if(confirm("Deseja mesmo eliminar este registo?")) {
                fetch(`${API}/${rota}/${id}`, {method:'DELETE'}).then(() => carregarTudo());
            }
        }

        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }
    </script>
</body>
</html>
